      content="default-src 'self';
               script-src 'self' 'unsafe-inline';
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com;
               img-src 'self' data: blob: https://*.s3.sa-east-1.amazonaws.com https://*.s3.amazonaws.com https://*.amazonaws.com https://*.cloudfront.net https://*.renovejasaude.com.br;
               connect-src 'self' https://*.renovejasaude.com.br wss://*.renovejasaude.com.br https://*.amazonaws.com https://*.daily.co wss://*.daily.co https://api.openai.com https://formspree.io https://*.ngrok-free.app https://*.ngrok.io ws://localhost:* http://localhost:*;
               media-src 'self' blob: https://*.daily.co;
               frame-src 'self' https://*.daily.co;
               object-src 'none';
               base-uri 'self';"
    />
