<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- CSP: mitiga XSS. Permite S3 (avatars, prescriptions), Daily.co (video), OpenAI. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' 'unsafe-eval';
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com;
               img-src 'self' data: blob: https://*.s3.sa-east-1.amazonaws.com https://*.s3.amazonaws.com https://*.amazonaws.com https://*.cloudfront.net;
               connect-src 'self' https://*.renovejasaude.com.br wss://*.renovejasaude.com.br https://*.amazonaws.com https://*.daily.co wss://*.daily.co https://api.openai.com https://*.ngrok-free.app https://*.ngrok.io ws://localhost:* http://localhost:*;
               media-src 'self' blob: https://*.daily.co;
               frame-src 'self' https://*.daily.co;
               object-src 'none';
               base-uri 'self';"
    />

    <title>RenoveJá+ — Portal do Médico</title>
    <meta
      name="description"
      content="Portal do Médico — Telemedicina com IA clínica, prescrição digital e consultas por vídeo"
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00a0dc" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RenoveJá+" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/icon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/icons/icon-72x72.png"
    />

    <!-- Splash screen color on Android -->
    <meta name="msapplication-TileColor" content="#00a0dc" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Safe area padding for notch devices -->
    <style>
      /* Standalone mode safe areas (notch, home indicator) */
      @media all and (display-mode: standalone) {
        body {
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
