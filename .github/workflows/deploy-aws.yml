name: Deploy RenoveJá+ AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: renoveja-api
  ECS_CLUSTER: renoveja-prod
  ECS_SERVICE: renoveja-api
  S3_FRONTEND_BUCKET: renoveja-frontend-web
  CF_DISTRIBUTION_ID: EXWM1ERYI9GZL

jobs:
  deploy-backend:
    name: Deploy Backend (ECS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f backend-dotnet/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Register Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://infra/task-definition.json \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition renoveja-api \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for Deployment
        run: |
          echo "Waiting for ECS service to stabilize (timeout ~15 min)..."
          for i in $(seq 1 60); do
            STATUS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "services[0].deployments[0].rolloutState" --output text)
            RUNNING=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "services[0].runningCount" --output text)
            DESIRED=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "services[0].desiredCount" --output text)
            echo "[$i/60] Status=$STATUS Running=$RUNNING Desired=$DESIRED"
            if [ "$RUNNING" = "$DESIRED" ]; then
              echo "Deployment complete!"
              exit 0
            fi
            sleep 15
          done
          echo "Timeout - showing recent events:"
          aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "services[0].events[0:5]" --output table
          exit 1

  deploy-frontend:
    name: Deploy Frontend (S3/CloudFront)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          cat > .env.production << EOF
          VITE_API_URL=https://api.renovejasaude.com.br
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          EOF

      - name: Build
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://$S3_FRONTEND_BUCKET --delete
          aws s3 sync dist/ s3://$S3_FRONTEND_BUCKET --exclude "*" --include "*.js" --content-type "application/javascript"
          aws s3 sync dist/ s3://$S3_FRONTEND_BUCKET --exclude "*" --include "*.css" --content-type "text/css"
          aws s3 cp s3://$S3_FRONTEND_BUCKET/index.html s3://$S3_FRONTEND_BUCKET/index.html --metadata-directive REPLACE --cache-control "no-cache" --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DISTRIBUTION_ID \
            --paths "/*"
