name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Para signing release, configure os seguintes secrets no repositório:
# - ANDROID_KEYSTORE_BASE64: keystore em base64 (keytool -genkey ...)
# - ANDROID_KEYSTORE_PASSWORD: senha do keystore
# - ANDROID_KEY_ALIAS: alias da chave
# - ANDROID_KEY_PASSWORD: senha da chave

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Tipo de build"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
      api_url:
        description: "URL da API (deixe vazio para usar o secret EXPO_PUBLIC_API_URL)"
        required: false
        default: ""

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-mobile
    env:
      NODE_ENV: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_legacy_peer_deps: "true"

      - name: Generate native project files
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || secrets.EXPO_PUBLIC_API_URL }}

      - name: Verify newArchEnabled in gradle.properties
        run: |
          if grep -q "newArchEnabled=true" android/gradle.properties; then
            echo "✓ New Architecture is enabled"
          else
            echo "⚠ Forcing newArchEnabled=true in gradle.properties"
            sed -i 's/newArchEnabled=false/newArchEnabled=true/' android/gradle.properties
          fi
          grep "newArchEnabled" android/gradle.properties

      - name: Inject google-services.json
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "ERRO: secret GOOGLE_SERVICES_JSON_BASE64 não configurado no repositório!"
            exit 1
          fi
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          node -e "const f=require('./android/app/google-services.json'); console.log('✓ google-services.json válido — projeto:', f.project_info.project_id)"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Setup Android signing
        if: github.event.inputs.build_type == 'release'
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "⚠ ANDROID_KEYSTORE_BASE64 não configurado. Build release usará debug signing."
          else
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
            node -e 'const fs=require("fs"),f="android/app/build.gradle",sp=process.env.STORE_PASS,ka=process.env.KEY_ALIAS,kp=process.env.KEY_PASS;let g=fs.readFileSync(f,"utf8");const b="    signingConfigs {\n        release {\n            storeFile file(\"release-keystore.jks\")\n            storePassword \""+sp+"\"\n            keyAlias \""+ka+"\"\n            keyPassword \""+kp+"\"\n        }\n    }";g=g.replace(/(android\s*\{)/,"$1\n"+b);g=g.replaceAll("signingConfig signingConfigs.debug","signingConfig signingConfigs.release");fs.writeFileSync(f,g);console.log("✓ signingConfigs injected");console.log(g.match(/signingConfig.*/g))'
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Increase Gradle JVM memory
        run: |
          # Fix OutOfMemoryError: Metaspace during lintVitalAnalyzeRelease
          sed -i 's/^org.gradle.jvmargs=.*//' android/gradle.properties
          echo "" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "✓ JVM args configurados: 4GB heap, 512MB Metaspace"

      - name: Build APK
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon -x lintVitalAnalyzeRelease
          else
            ./gradlew assembleDebug --no-daemon
          fi
        env:
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || secrets.EXPO_PUBLIC_API_URL }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: renoveja-${{ github.event.inputs.build_type }}-apk
          path: |
            frontend-mobile/android/app/build/outputs/apk/release/*.apk
            frontend-mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
